  push:
    branches:
      - 'develop'
    tags:
      - "*"
  pull_request:
    branches: [ "develop" ]
    types: [ opened, synchronize, reopened, labeled, unlabeled, edited ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

